{% if site.inc_before_meta %}
{% include {{ site.inc_before_meta }} %}
{% endif %}

<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="chrome=1">
<meta name="viewport" content="width=device-width, initial-scale=1">

{% seo %}

{% if page.image %}
<meta property="og:image" content="{{ page.image }}">
<meta name="twitter:image" content="{{ page.image }}">
{% elsif site.logo_url %}
<meta property="og:image" content="{{ site.logo_url | absolute_url }}">
<meta name="twitter:image" content="{{ site.logo_url | absolute_url }}">
{% endif %}

{% if site.inc_after_meta %}
{% include {{ site.inc_after_meta }} %}
{% endif %}
